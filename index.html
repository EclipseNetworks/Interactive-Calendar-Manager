<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XCLIPSE | PIPELINE_C2_UPLINK</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=JetBrains+Mono:wght@200;400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent1: #ec4899; --accent2: #8b5cf6; --success: #4ade80;
            --bg-deep: #010206; --glass: rgba(255, 255, 255, 0.02);
        }
        body {
            background: var(--bg-deep); color: #fff; margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif; overflow-x: hidden;
        }
        header {
            background: linear-gradient(135deg, #010206 0%, #0f172a 100%);
            padding: 50px 20px; text-align: center; border-bottom: 1px solid rgba(236, 72, 153, 0.2);
        }
        header h1 {
            font-size: 2.5rem; font-weight: 900; margin: 0; letter-spacing: -1px;
            color: white; text-transform: uppercase;
        }
        .pink-glow { color: var(--accent1); text-shadow: 0 0 15px rgba(236, 72, 153, 0.5); }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 380px 1fr; gap: 30px; }
        
        .glass-panel {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .monitor {
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px;
            margin-bottom: 25px; border-left: 3px solid var(--accent1); color: #888;
        }

        input, textarea {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 15px; color: white; margin-bottom: 15px;
            font-family: 'JetBrains Mono', monospace; outline: none;
        }
        input:focus { border-color: var(--accent1); }

        .btn-sync {
            background: var(--accent1); width: 100%; padding: 18px; border: none; 
            border-radius: 10px; color: #fff; font-weight: 900; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; letter-spacing: 2px; font-size: 11px;
        }
        .btn-sync:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .event-node {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 25px; border-radius: 15px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .meta h3 { margin: 0; font-size: 1.1rem; color: var(--accent1); }
        .meta p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.5; }
        
        .btn-del {
            background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444;
            color: #ef4444; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 10px;
        }

        .sub-link {
            grid-column: span 2; background: rgba(0,0,0,0.3); padding: 15px;
            border-radius: 10px; text-align: center; font-size: 10px; font-family: 'JetBrains Mono';
            border: 1px solid rgba(255,255,255,0.05); color: #555;
        }
    </style>
</head>
<body>

<header>
    <h1>XCLIPSE <span class="pink-glow">PIPELINE</span></h1>
    <p style="font-size: 9px; opacity: 0.4; letter-spacing: 4px; margin-top: 10px;">C2_INTEGRATED_NETWORK_V4.7</p>
</header>

<div class="container">
    <div class="sidebar">
        <div class="glass-panel">
            <div class="monitor" id="sys-monitor">
                [SYSTEM]: KERNEL_IDLE<br>
                [UPLINK]: READY_TO_BROADCAST<br>
                [DATABASE]: CONNECTED_TO_SECURITY_NODE
            </div>

            <form id="eventForm">
                <input type="text" id="evTitle" placeholder="NODE_TITLE" required>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="datetime-local" id="evStart" required>
                    <input type="datetime-local" id="evEnd" required>
                </div>
                <textarea id="evDesc" placeholder="NODE_SPECIFICATIONS..." rows="4"></textarea>
                <button type="submit" id="syncBtn" class="btn-sync">Execute Master Push</button>
            </form>
        </div>
    </div>

    <div class="pipeline-feed" id="pipelineFeed">
        </div>

    <div class="sub-link">
        SUBSCRIPTION_URL: https://raw.githubusercontent.com/eclipsenetworks/Interactive-Calendar-Manager/main/calendar.ics
    </div>
</div>

<script>
    // 1. DATA SOURCE COORDINATION (Using Admin-C2 Credentials)
    const firebaseConfig = {
        apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
        authDomain: "xclipse-security.firebaseapp.com",
        databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xclipse-security",
        storageBucket: "xclipse-security.firebasestorage.app",
        messagingSenderId: "161353959200",
        appId: "1:161353959200:web:d0b36f7817b31842cff945"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const GITHUB_CFG = {
        token: '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',
        owner: 'eclipsenetworks',
        repo: 'Interactive-Calendar-Manager',
        path: 'calendar.ics'
    };

    let eventVault = [];

    // 2. REAL-TIME MULTI-ADMIN LISTENER
    db.ref('network/pipeline_events').on('value', (snapshot) => {
        const data = snapshot.val();
        eventVault = data ? Object.values(data) : [];
        renderPipeline();
    });

    const timestampICS = (d) => new Date(d).toISOString().replace(/[-:]/g, '').split('.')[0] + "Z";

    // 3. THE TRIPLE-SYNC HANDSHAKE
    async function executeGlobalSync() {
        const mon = document.getElementById('sys-monitor');
        mon.innerHTML = `[SYSTEM]: BROADCASTING...<br>[C2]: SENDING_LOG_PACKET<br>[GITHUB]: INJECTING_ICS`;

        try {
            // A. Update Firebase Database (Syncs all Admin Screens)
            await db.ref('network/pipeline_events').set(eventVault);

            // B. Send Log to Admin-C2 Command Center
            const logMsg = `>> PIPELINE_SYNC: ${eventVault.length} NODES_ACTIVE`;
            db.ref('network/logs').push({
                msg: logMsg,
                color: 'pink',
                timestamp: Date.now()
            });

            // C. Generate ICS and Push to GitHub (For Apple Calendar)
            let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Xclipse//EN\nX-PUBLISHED-TTL:PT1H\n";
            eventVault.forEach(node => {
                const uid = btoa(node.title + node.start).substring(0, 12);
                ics += `BEGIN:VEVENT\nUID:${uid}@xclipse.net\nSUMMARY:${node.title.toUpperCase()}\nDTSTART:${timestampICS(node.start)}\nDTEND:${timestampICS(node.end)}\nDESCRIPTION:${node.desc}\nEND:VEVENT\n`;
            });
            ics += "END:VCALENDAR";

            const fileRes = await fetch(`https://api.github.com/repos/${GITHUB_CFG.owner}/${GITHUB_CFG.repo}/contents/${GITHUB_CFG.path}`, {
                headers: { 'Authorization': `token ${GITHUB_CFG.token}` }
            });
            const fileData = await fileRes.json();

            await fetch(`https://api.github.com/repos/${GITHUB_CFG.owner}/${GITHUB_CFG.repo}/contents/${GITHUB_CFG.path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GITHUB_CFG.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "C2_SYSTEM_AUTO_SYNC",
                    content: btoa(unescape(encodeURIComponent(ics))),
                    sha: fileData.sha
                })
            });

            mon.innerHTML = `[SYSTEM]: UPLINK_SUCCESS<br>[NET]: ALL_NODES_SYNCHRONIZED`;
        } catch (err) {
            mon.innerHTML = `[SYSTEM]: SYNC_ERROR<br>[ERR]: ${err.message}`;
        }
    }

    function renderPipeline() {
        const feed = document.getElementById('pipelineFeed');
        feed.innerHTML = "";
        eventVault.sort((a,b) => new Date(a.start) - new Date(b.start)).forEach((node, i) => {
            const div = document.createElement('div');
            div.className = "event-node";
            div.innerHTML = `
                <div class="meta">
                    <h3>${node.title}</h3>
                    <p>${new Date(node.start).toLocaleString()} — ${new Date(node.end).toLocaleTimeString()}</p>
                </div>
                <button class="btn-del" onclick="removeNode(${i})">PURGE</button>
            `;
            feed.appendChild(div);
        });
    }

    document.getElementById('eventForm').onsubmit = async (e) => {
        e.preventDefault();
        eventVault.push({
            title: document.getElementById('evTitle').value,
            start: document.getElementById('evStart').value,
            end: document.getElementById('evEnd').value,
            desc: document.getElementById('evDesc').value
        });
        await executeGlobalSync();
        e.target.reset();
    };

    window.removeNode = async (i) => {
        eventVault.splice(i, 1);
        await executeGlobalSync();
    };
</script>
</body>
</html>
