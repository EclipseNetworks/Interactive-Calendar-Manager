<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>★》 XCLIPSE | PIPELINE SYNC 《★</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: '#ec4899', terminal: '#4ade80', dark: '#02040a' },
            fontFamily: { mono: ['JetBrains Mono', 'monospace'], display: ['Syncopate', 'sans-serif'] }
          }
        }
      }
    </script>

    <style>
      body { background: #02040a; color: white; cursor: crosshair; font-family: 'JetBrains Mono', monospace; }
      .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(236, 72, 153, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(236, 72, 153, 0.05) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
      .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
      .sync-active { color: #4ade80; text-shadow: 0 0 10px #4ade80; }
      input, textarea { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
      input:focus { border-color: #ec4899 !important; outline: none; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="container mx-auto max-w-5xl px-6 py-10">
        <header class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
            <div>
                <h1 class="font-display text-[10px] tracking-[0.8em] text-primary">XCLIPSE_NETWORKS</h1>
                <h2 class="text-3xl font-bold italic uppercase tracking-tighter">Live_Pipeline</h2>
            </div>
            <div id="sync-status" class="text-[9px] font-bold opacity-50 uppercase">
                Status: <span id="status-text">Ready</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <form id="pipelineForm" class="glass p-6 rounded-xl space-y-4">
                    <p class="text-[10px] text-primary font-bold">>> NEW_ENTRY</p>
                    <input type="text" id="title" placeholder="EVENT_TITLE" class="w-full p-3 text-[10px]" required />
                    <div class="grid grid-cols-2 gap-2">
                        <input type="datetime-local" id="start" class="p-3 text-[9px]" required />
                        <input type="datetime-local" id="end" class="p-3 text-[9px]" required />
                    </div>
                    <textarea id="desc" placeholder="SPECIFICATIONS" class="w-full p-3 text-[10px] h-24"></textarea>
                    <button type="submit" id="submitBtn" class="w-full bg-white text-black font-bold text-[10px] py-4 hover:bg-primary hover:text-white transition-all uppercase">
                        Push to GitHub
                    </button>
                </form>
                
                <div class="mt-4 p-4 glass rounded-xl">
                    <p class="text-[9px] opacity-40 mb-2 uppercase">Subscription URL (Paste in Apple Calendar):</p>
                    <code class="text-[8px] text-primary break-all">https://raw.githubusercontent.com/eclipsenetworks/Interactive-Calendar-Manager/main/calendar.ics</code>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="eventList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            token: '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',
            owner: 'eclipsenetworks',
            repo: 'Interactive-Calendar-Manager',
            path: 'calendar.ics'
        };

        let events = JSON.parse(localStorage.getItem('xclipse_events') || '[]');

        const formatICSDate = (d) => new Date(d).toISOString().replace(/[-:]/g,'').split('.')[0] + "Z";

        async function updateGitHub() {
            const status = document.getElementById('status-text');
            status.innerText = "Syncing...";
            
            // 1. Build ICS Content
            let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Xclipse Studio//EN\nX-PUBLISHED-TTL:PT1H\n";
            events.forEach(ev => {
                ics += "BEGIN:VEVENT\n";
                ics += `UID:${btoa(ev.title + ev.start).substring(0,12)}@xclipse.net\n`;
                ics += `SUMMARY:${ev.title}\n`;
                ics += `DTSTART:${formatICSDate(ev.start)}\n`;
                ics += `DTEND:${formatICSDate(ev.end)}\n`;
                ics += `DESCRIPTION:${ev.desc}\n`;
                ics += "END:VEVENT\n";
            });
            ics += "END:VCALENDAR";

            try {
                // 2. Get SHA of existing file
                const getFile = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                    headers: { 'Authorization': `token ${CONFIG.token}` }
                });
                const fileData = await getFile.json();
                
                // 3. Push Update
                const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${CONFIG.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "System: Auto-update pipeline",
                        content: btoa(ics),
                        sha: fileData.sha
                    })
                });

                if(res.ok) {
                    status.innerText = "Synchronized";
                    status.className = "sync-active";
                }
            } catch (err) {
                status.innerText = "Error: API_AUTH_FAILED";
                console.error(err);
            }
        }

        function render() {
            const container = document.getElementById('eventList');
            container.innerHTML = events.length ? '' : '<p class="opacity-20 text-[10px]">EMPTY_PIPELINE</p>';
            
            events.forEach((ev, i) => {
                const el = document.createElement('div');
                el.className = "glass p-4 rounded-lg flex justify-between items-center border-l-2 border-primary";
                el.innerHTML = `
                    <div>
                        <h4 class="text-[11px] font-bold text-white/90 uppercase">${ev.title}</h4>
                        <p class="text-[9px] text-terminal mt-1">${new Date(ev.start).toLocaleString()}</p>
                    </div>
                    <button onclick="remove(${i})" class="text-[10px] opacity-30 hover:text-red-500 hover:opacity-100 transition">REMOVE</button>
                `;
                container.appendChild(el);
            });
            localStorage.setItem('xclipse_events', JSON.stringify(events));
        }

        document.getElementById('pipelineForm').onsubmit = async (e) => {
            e.preventDefault();
            const newEv = {
                title: document.getElementById('title').value,
                start: document.getElementById('start').value,
                end: document.getElementById('end').value,
                desc: document.getElementById('desc').value
            };
            events.push(newEv);
            render();
            await updateGitHub();
            e.target.reset();
        };

        window.remove = async (i) => {
            events.splice(i, 1);
            render();
            await updateGitHub();
        };

        render();
    </script>
</body>
</html>
