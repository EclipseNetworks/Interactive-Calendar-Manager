<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XCLIPSE_C2 // TEMPORAL_UPLINK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ec4899; --bg: #010206; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .glass { background: rgba(255,255,255,0.01); border: 1px solid rgba(236,72,153,0.1); backdrop-filter: blur(20px); }
        .neon-text { color: var(--p); text-shadow: 0 0 15px var(--p); }
        
        /* 1S PULSE ANIMATION */
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(2.5); opacity: 0; } }
        .pulse-core { width: 10px; height: 10px; background: var(--p); border-radius: 50%; position: relative; }
        .pulse-ring { position: absolute; width: 100%; height: 100%; border: 2px solid var(--p); border-radius: 50%; animation: pulse-ring 1s infinite; }
        
        input, textarea { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; font-size: 10px; }
        .custom-scroll::-webkit-scrollbar { width: 2px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--p); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto h-screen flex flex-col">
        <header class="flex justify-between items-center border-b border-white/5 pb-6 mb-8">
            <div class="flex items-center gap-6">
                <div class="pulse-core"><div class="pulse-ring"></div></div>
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter">UPLINK_<span class="neon-text">TEMPORAL</span></h1>
                    <p class="text-[8px] opacity-30 uppercase tracking-[0.4em]">Freq: 1000ms // Protocol: ICS_BINARY_STREAM</p>
                </div>
            </div>
            <div id="sync-timer" class="text-right font-black text-xl opacity-20">00:00:00</div>
        </header>

        <div class="grid grid-cols-12 gap-8 flex-grow overflow-hidden">
            <div class="col-span-4 space-y-4">
                <div class="glass p-6 rounded-3xl">
                    <p class="text-[9px] text-pink-500 font-bold mb-4 uppercase">>> Append_Pipeline_Node</p>
                    <form id="icsForm" class="space-y-3">
                        <input type="text" id="title" placeholder="SUMMARY (e.g. Adelaide)" class="w-full p-4 outline-none" required>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="date" id="start" class="p-4" required>
                            <input type="date" id="end" class="p-4" required>
                        </div>
                        <textarea id="desc" placeholder="DESCRIPTION (e.g. Deployment Info)" class="w-full p-4 h-24 outline-none"></textarea>
                        <button type="submit" class="w-full bg-pink-600 hover:bg-pink-500 text-white font-black py-4 text-[10px] uppercase tracking-widest transition-all">Execute Push</button>
                    </form>
                </div>
                
                <div class="glass p-4 rounded-2xl text-[9px] opacity-40 leading-relaxed font-mono">
                    [REF]: calendar.xclipsenetworks.com/calendar.ics<br>
                    [TTL]: 3600S (Requesting 1S Override)<br>
                    [SHA]: <span id="sha-val">PENDING...</span>
                </div>
            </div>

            <div class="col-span-8 flex flex-col h-full">
                <div id="nodeFeed" class="space-y-2 overflow-y-auto pr-4 custom-scroll flex-grow">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE ENCRYPTION NODES
        const firebaseConfig = {
            apiKey: "AIzaSyCdv6yESBrKhlEvU2URCXoVRVO-2OjAEv4",
            authDomain: "xclipse-security.firebaseapp.com",
            databaseURL: "https://xclipse-security-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "xclipse-security",
            storageBucket: "xclipse-security.firebasestorage.app",
            messagingSenderId: "161353959200",
            appId: "1:161353959200:web:d0b36f7817b31842cff945"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const GITHUB = {
            token: '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',
            owner: 'eclipsenetworks',
            repo: 'Interactive-Calendar-Manager',
            path: 'calendar.ics'
        };

        let activeNodes = [];
        let globalPulse = 0;

        // 1. RECURSIVE TEMPORAL PULSE (1-Second Logic)
        setInterval(() => {
            globalPulse++;
            const now = new Date();
            document.getElementById('sync-timer').innerText = now.toLocaleTimeString();
            
            // Every second, we signal to Firebase that this admin is active
            if(globalPulse % 5 === 0) { 
                db.ref('network/status/pipeline_last_pulse').set(Date.now());
            }
        }, 1000);

        // 2. REAL-TIME DATA ARCHITECTURE
        db.ref('network/pipeline_events').on('value', (snap) => {
            const data = snap.val();
            activeNodes = data ? Object.values(data) : [];
            renderNodes();
            pushToGitHub(); // Update the .ics file instantly when data changes
        });

        const cleanDate = (d) => d.replaceAll('-', '');

        // 3. SUFFOCATED ICS GENERATION ENGINE
        async function pushToGitHub() {
            let ics = `BEGIN:VCALENDAR\nPRODID:-//Xclipse//C2//EN\nVERSION:2.0\nCALSCALE:GREGORIAN\nMETHOD:PUBLISH\nX-WR-CALNAME:XCLIPSE_PIPELINE\nX-WR-TIMEZONE:UTC\nX-PUBLISHED-TTL:PT1H\n`;
            
            activeNodes.forEach(n => {
                const uid = btoa(n.title + n.start).substring(0, 10);
                ics += `BEGIN:VEVENT\n`;
                ics += `UID:${uid}@xclipsenetworks\n`;
                ics += `DTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z\n`;
                ics += `DTSTART;VALUE=DATE:${cleanDate(n.start)}\n`;
                ics += `DTEND;VALUE=DATE:${cleanDate(n.end)}\n`;
                ics += `SUMMARY:${n.title}\n`;
                ics += `DESCRIPTION:${n.desc}\n`;
                ics += `STATUS:CONFIRMED\n`;
                ics += `CATEGORIES:Deployment\n`;
                ics += `END:VEVENT\n`;
            });
            ics += `END:VCALENDAR`;

            try {
                // Get current SHA
                const fileRef = await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}`, {
                    headers: { 'Authorization': `token ${GITHUB.token}` }
                });
                const fileData = await fileRef.json();
                document.getElementById('sha-val').innerText = fileData.sha.substring(0, 12);

                // Push Update
                await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `TEMPORAL_PULSE_${Date.now()}`,
                        content: btoa(unescape(encodeURIComponent(ics))),
                        sha: fileData.sha
                    })
                });
            } catch (e) { console.error("UPLINK_BLOCKED", e); }
        }

        function renderNodes() {
            const feed = document.getElementById('nodeFeed');
            feed.innerHTML = activeNodes.map((n, i) => `
                <div class="glass p-5 rounded-2xl flex justify-between items-center border-l-2 border-pink-500 animate-pulse-once">
                    <div>
                        <h4 class="text-xs font-black pink-neon uppercase">${n.title}</h4>
                        <p class="text-[8px] opacity-40 mt-1">${n.start} >> ${n.end}</p>
                    </div>
                    <button onclick="purge(${i})" class="text-[8px] bg-red-500/10 text-red-500 border border-red-500/20 px-4 py-2 hover:bg-red-500 hover:text-white transition">TERMINATE</button>
                </div>
            `).join('');
        }

        document.getElementById('icsForm').onsubmit = (e) => {
            e.preventDefault();
            const node = {
                title: document.getElementById('title').value,
                start: document.getElementById('start').value,
                end: document.getElementById('end').value,
                desc: document.getElementById('desc').value
            };
            activeNodes.push(node);
            db.ref('network/pipeline_events').set(activeNodes);
            db.ref('network/logs').push({ msg: `>> UPLINK: NODE_${node.title}_INJECTED`, color: 'pink', timestamp: Date.now() });
            e.target.reset();
        };

        window.purge = (i) => {
            activeNodes.splice(i, 1);
            db.ref('network/pipeline_events').set(activeNodes);
        };
    </script>
</body>
</html>
