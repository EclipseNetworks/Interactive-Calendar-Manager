<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>★》 XCLIPSE NETWORKS | CALENDAR 《★</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#ec4899', 
              secondary: '#a855f7',
              dark: '#050811',
              'glass-border': 'rgba(255, 255, 255, 0.08)'
            },
            fontFamily: { 
                sans: ['Montserrat', 'sans-serif'],
                display: ['Syncopate', 'sans-serif']
            }
          }
        }
      }
    </script>

    <style>
      :root {
        --primary-glow: #ec4899;
        --transition-fluid: cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        background: #050811;
        color: white;
        font-family: 'Montserrat', sans-serif;
        overflow-x: hidden;
        cursor: none;
      }

      .mesh-gradient {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: -1;
        background: radial-gradient(circle at 50% 50%, #0a0d1a 0%, #050811 100%);
      }

      .blob {
        position: absolute; width: 500px; height: 500px;
        background: rgba(236, 72, 153, 0.05);
        filter: blur(100px); border-radius: 50%;
        animation: morph 20s infinite alternate linear;
      }

      @keyframes morph {
        0% { border-radius: 40% 60% 60% 40%; transform: scale(1); }
        100% { border-radius: 30% 60% 70% 40%; transform: scale(1.1); }
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: 0.4s var(--transition-fluid);
      }

      .glass-card:hover { border-color: rgba(236, 72, 153, 0.3); }

      #cursor { width: 8px; height: 8px; background: var(--primary-glow); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: difference; }
      
      input, textarea {
        background: rgba(255,255,255,0.03) !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
        color: white !important;
        transition: all 0.3s ease;
      }

      input:focus { border-color: #ec4899 !important; outline: none; box-shadow: 0 0 15px rgba(236, 72, 153, 0.2); }

      .reveal-text {
        background: linear-gradient(to right, #fff 20%, #ec4899 40%, #ec4899 60%, #fff 80%);
        background-size: 200% auto;
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shine 8s linear infinite;
      }

      @keyframes shine { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    </style>
</head>
<body class="selection:bg-primary">

    <div id="cursor"></div>
    <div class="mesh-gradient">
        <div class="blob" style="top: -10%; right: -5%;"></div>
        <div class="blob" style="bottom: -10%; left: -5%; background: rgba(168, 85, 247, 0.04);"></div>
    </div>

    <header class="py-12 text-center">
        <h1 class="font-display text-sm tracking-[0.8em] text-primary mb-2 uppercase opacity-60">Management Portal</h1>
        <h2 class="reveal-text text-4xl md:text-6xl font-black italic uppercase tracking-tighter">Event Pipeline</h2>
    </header>

    <div class="container mx-auto max-w-4xl px-6 pb-20">
        <form id="addEventForm" class="glass-card p-8 rounded-[2.5rem] mb-12">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <input type="text" id="eventTitle" placeholder="EVENT TITLE" class="p-4 rounded-2xl font-bold tracking-widest text-[10px] uppercase" required />
                <div class="flex gap-4">
                    <input type="datetime-local" id="eventStart" class="p-4 rounded-2xl flex-1 text-[10px]" required />
                    <input type="datetime-local" id="eventEnd" class="p-4 rounded-2xl flex-1 text-[10px]" required />
                </div>
            </div>
            <textarea id="eventDescription" placeholder="EVENT SPECIFICATIONS/DETAILS" class="w-full p-4 rounded-2xl mb-6 min-h-[100px] text-[10px] uppercase tracking-wider font-medium"></textarea>
            <button type="submit" class="w-full bg-white text-black font-black text-[10px] py-5 rounded-full hover:bg-primary hover:text-white transition uppercase tracking-[0.3em]">
                Push to Pipeline
            </button>
        </form>

        <div id="eventsList" class="space-y-6"></div>

        <button id="downloadICS" class="mt-12 w-full border border-primary/30 text-primary font-black text-[10px] py-5 rounded-full hover:bg-primary/10 transition uppercase tracking-[0.3em]">
            <i class="fas fa-file-export mr-2"></i> Export ICS Calendar
        </button>
    </div>

    <script>
        let events = [];

        function formatICSDate(d){ return d.toISOString().replace(/[-:]/g,'').split('.')[0] + "Z"; }
        function formatReadable(d){ 
            return d.toLocaleString('en-US',{ weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true }); 
        }

        function loadEvents(){
            const saved = localStorage.getItem('xclipse_calendar_events');
            if(saved){
                events = JSON.parse(saved).map(ev => ({
                    ...ev,
                    startDate: new Date(ev.startDate),
                    endDate: new Date(ev.endDate)
                }));
            } else {
                // Default event for March 14 Launch
                events.push({
                    title: "PROJECT X-LAUNCH",
                    description: "Official launch event for Xclipse Studio digital projects.",
                    startDate: new Date('2026-03-14T09:00:00'),
                    endDate: new Date('2026-03-14T17:00:00')
                });
                saveEvents();
            }
        }

        function saveEvents(){ localStorage.setItem('xclipse_calendar_events', JSON.stringify(events)); }

        function renderEvents(){
            const list = document.getElementById("eventsList");
            list.innerHTML = "";
            events.forEach((ev, index) => {
                const card = document.createElement("div");
                card.className = "glass-card p-6 rounded-[2rem] flex flex-col md:flex-row justify-between items-center gap-4 group";
                card.innerHTML = `
                    <div class="text-center md:text-left">
                        <p class="text-primary font-black text-[8px] tracking-[0.4em] uppercase mb-1">Scheduled Master</p>
                        <h3 class="text-xl font-bold italic uppercase tracking-tighter mb-2 group-hover:text-primary transition-colors">${ev.title}</h3>
                        <p class="text-gray-500 text-[9px] font-bold uppercase tracking-widest">
                            ${formatReadable(ev.startDate)} — ${formatReadable(ev.endDate)}
                        </p>
                        <p class="text-gray-400 text-[10px] mt-2 italic opacity-60">${ev.description}</p>
                    </div>
                    <button onclick="removeEvent(${index})" class="text-[9px] font-black text-gray-600 hover:text-red-500 transition uppercase tracking-widest">
                        Remove
                    </button>
                `;
                list.appendChild(card);
            });
            saveEvents();
        }

        function removeEvent(index){
            events.splice(index, 1);
            renderEvents();
        }

        document.getElementById("addEventForm").addEventListener("submit", e => {
            e.preventDefault();
            const newEvent = {
                title: document.getElementById("eventTitle").value,
                description: document.getElementById("eventDescription").value,
                startDate: new Date(document.getElementById("eventStart").value),
                endDate: new Date(document.getElementById("eventEnd").value),
            };
            events.push(newEvent);
            renderEvents();
            e.target.reset();
        });

        document.getElementById("downloadICS").addEventListener("click", () => {
            let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Xclipse Studio//EN\n";
            events.forEach(ev => {
                ics += "BEGIN:VEVENT\n";
                ics += `SUMMARY:${ev.title}\n`;
                ics += `DESCRIPTION:${ev.description}\n`;
                ics += `DTSTART:${formatICSDate(ev.startDate)}\n`;
                ics += `DTEND:${formatICSDate(ev.endDate)}\n`;
                ics += "END:VEVENT\n";
            });
            ics += "END:VCALENDAR";
            const blob = new Blob([ics], {type: 'text/calendar'});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "xclipse_pipeline.ics";
            a.click();
        });

        // Cursor Logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.transform = `translate3d(${e.clientX - 4}px, ${e.clientY - 4}px, 0)`;
        });

        loadEvents();
        renderEvents();
    </script>
</body>
</html>
