<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xclipse Networks Pro Calendar</title>
<style>
:root {
  --accent1: #ff6b6b;
  --accent2: #feca57;
  --success: #1dd1a1;
  --bg1: rgba(30, 30, 45, 0.85);
  --bg2: #1f1f1f;
  --text: #ffffff;
}

body {
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top left, #2c2c54, #1f1f1f);
  color: var(--text);
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

header {
  background: linear-gradient(90deg, var(--accent1), var(--accent2));
  padding: 30px 10px;
  text-align: center;
  font-size: 2.4rem;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 0 10px rgba(0,0,0,0.3);
  letter-spacing: 1px;
  animation: fadeDown 1s ease;
}

.container {
  max-width: 1000px;
  margin: 30px auto;
  padding: 20px;
}

form {
  background: var(--bg1);
  padding: 25px;
  border-radius: 20px;
  margin-bottom: 35px;
  box-shadow: 0 4px 25px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  animation: slideDown 0.6s ease;
}

form input, form textarea {
  width: 100%;
  padding: 14px;
  margin-bottom: 18px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
  transition: all 0.3s ease;
}

form input:focus, form textarea:focus {
  transform: scale(1.02);
  box-shadow: 0 0 15px var(--accent1);
}

form button {
  background: linear-gradient(90deg, var(--accent1), var(--accent2));
  border: none;
  padding: 14px 24px;
  border-radius: 12px;
  cursor: pointer;
  color: #fff;
  font-weight: bold;
  transition: all 0.3s ease;
  width: 100%;
  font-size: 1rem;
}
form button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px var(--accent2);
}

.event {
  background: linear-gradient(135deg, #4b79a1, #283e51);
  margin: 15px 0;
  padding: 20px;
  border-radius: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.3s ease;
  cursor: pointer;
  animation: fadeInUp 0.4s ease forwards;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

.event:hover {
  transform: scale(1.03) translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.6);
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: #1f1f1f;
}

.event div { max-width: 80%; }
.event button {
  background: var(--accent1);
  padding: 8px 16px;
  border-radius: 10px;
  border: none;
  color: #fff;
  cursor: pointer;
  transition: 0.3s;
}
.event button:hover { background: #ff4757; transform: scale(1.1); }

#downloadICS {
  background: linear-gradient(90deg, var(--success), #10ac84);
  border: none;
  padding: 16px 28px;
  font-size: 1rem;
  border-radius: 15px;
  cursor: pointer;
  margin-top: 25px;
  transition: all 0.3s ease;
  width: 100%;
  font-weight: bold;
}
#downloadICS:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px var(--success);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 700px) {
  header { font-size: 1.8rem; padding: 20px 5px; }
  .container { padding: 10px; }
  form { padding: 15px; }
}
</style>
</head>
<body>
<header>Xclipse Networks Calendar</header>
<div class="container">
  <form id="addEventForm">
    <input type="text" id="eventTitle" placeholder="Event Title" required />
    <input type="datetime-local" id="eventStart" required />
    <input type="datetime-local" id="eventEnd" required />
    <textarea id="eventDescription" placeholder="Event Description"></textarea>
    <button type="submit">Add Event</button>
  </form>

  <div id="eventsList"></div>
  <button id="downloadICS">Download ICS</button>
</div>

<script>
let events = [];

function formatICSDate(d){ return d.toISOString().replace(/[-:]/g,'').split('.')[0]; }
function formatReadable(d){ return d.toLocaleString('en-US',{ weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true }); }

function loadEvents(){
  const saved = localStorage.getItem('xclipse_calendar_events');
  if(saved){
    events = JSON.parse(saved).map(ev => ({
      ...ev,
      startDate: new Date(ev.startDate),
      endDate: new Date(ev.endDate)
    }));
  } else {
    const deployDate = new Date('2025-12-15T00:00:00Z');
    const deployEnd = new Date('2025-12-16T00:00:00Z');
    events.push({
      title: "Xclipse Networks Website Deployment",
      description: "Launch day for the Xclipse Networks website.",
      startDate: deployDate,
      endDate: deployEnd
    });
    saveEvents();
  }
}

function saveEvents(){
  localStorage.setItem('xclipse_calendar_events', JSON.stringify(events));
}

const eventsList = document.getElementById("eventsList");
function renderEvents(){
  eventsList.innerHTML="";
  events.forEach((ev,index)=>{
    const div=document.createElement("div");
    div.className="event";
    div.style.animationDelay = `${index * 0.05}s`;
    div.innerHTML=`<div>
      <strong>${ev.title}</strong><br>
      ${formatReadable(ev.startDate)} - ${formatReadable(ev.endDate)}<br>
      ${ev.description}
    </div>
    <button onclick="removeEvent(${index})">Remove</button>`;
    eventsList.appendChild(div);
  });
  saveEvents();
}

function removeEvent(index){
  events.splice(index,1);
  renderEvents();
}

document.getElementById("addEventForm").addEventListener("submit",e=>{
  e.preventDefault();
  const newEvent = {
    title: document.getElementById("eventTitle").value,
    description: document.getElementById("eventDescription").value,
    startDate: new Date(document.getElementById("eventStart").value),
    endDate: new Date(document.getElementById("eventEnd").value),
  };
  events.push(newEvent);
  renderEvents();
  e.target.reset();
});

function generateICS(){
  let ics="BEGIN:VCALENDAR\nVERSION:2.0\nCALSCALE:GREGORIAN\nPRODID:-//Xclipse Networks//Pro Calendar//EN\n";
  events.forEach(ev=>{
    ics+="BEGIN:VEVENT\n";
    ics+=`SUMMARY:${ev.title}\n`;
    ics+=`DESCRIPTION:${ev.description}\n`;
    ics+=`DTSTART:${formatICSDate(ev.startDate)}\n`;
    ics+=`DTEND:${formatICSDate(ev.endDate)}\n`;
    ics+="STATUS:CONFIRMED\nEND:VEVENT\n";
  });
  ics+="END:VCALENDAR";
  return ics;
}

document.getElementById("downloadICS").addEventListener("click",()=>{
  const blob=new Blob([generateICS()],{type:'text/calendar'});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="xclipse_networks_calendar.ics";
  a.click();
});

loadEvents();
renderEvents();
</script>
</body>
</html>
